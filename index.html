<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Movie Booking</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🎬 Movie Booking</h1>

  <div class="movie-container">
    <label>Select a movie:</label>
    <select id="movie">
      <option value="10">Avengers ($10)</option>
      <option value="12">Batman ($12)</option>
      <option value="8">Interstellar ($8)</option>
    </select>
  </div>

  <div class="screen"></div>

  <div class="seats">
    <!-- Seats generated by JS -->
  </div>

  <p class="info">
    You selected <span id="count">0</span> seats — Total: $<span id="total">0</span>
  </p>

  <button id="bookBtn">Book Now</button>
</div>

<script src="script.js"></script>
</body>
</html>
